<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Image Carousel</title> 
    <link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"> 
</head> 
<body> 
<div style="height: 100vh; ">     
<h2 style="width: 100%; height: 50px; text-align: center;background: linear
gradient(orange,pink);color:darkorchid; text-shadow: 2px;">Carousel Program</h2> 
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel"> 
    <div class="carousel-inner"> 
        {% for image in images %} 
            <div class="carousel-item {% if forloop.first %}active{% endif %}"> 
                <img style="height: calc(90vh);" src="{{ image.image.url }}" 
class="d-block w-100" alt="{{ image.title }}"> 
            </div> 
        {% endfor %} 
    </div> 
    <button class="carousel-control-prev" type="button" data-bs
target="#carouselExample" data-bs-slide="prev"> 
        <span class="carousel-control-prev-icon" aria-hidden="true"></span> 
        <span class="visually-hidden">Previous</span> 
            </button> 
    <button class="carousel-control-next" type="button" data-bs
target="#carouselExample" data-bs-slide="next"> 
        <span class="carousel-control-next-icon" aria-hidden="true"></span> 
        <span class="visually-hidden">Next</span> 
    </button> 
</div> 
</div> 
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
></script> 
</body> 
</html>
